meta:
  id: HIGH-ARBITRARY-TRANSFERFROM
  title: "Arbitrary transferFrom Call"
  severity: HIGH
  confidence: MEDIUM
  description: "Function allows arbitrary transferFrom with user-controlled 'from' address"
  recommendation: "Ensure proper validation: require admin modifier, or validate from == msg.sender, or use proper allowance mechanism like ERC20"
  references:
    - https://swcregistry.io/docs/SWC-105
    - https://github.com/crytic/slither/wiki/Detector-Documentation#arbitrary-send-erc20

query:
  scope: entrypoint

  filter:
    # Function must neither be privileged-gated (owner/admin/role modifiers or
    # auth helpers) NOR self-scope the caller (require(from == msg.sender)).
    # Self-scoping is the canonical mitigation here — you can only move your own
    # tokens — so it is treated as safe even though it is not access control.
    preset: unCheckedSender

  match:
    # External transferFrom where the `from` argument is controlled by a caller
    # parameter. This includes indexed parameters such as from[i].
    contains:
      kind: token_call
      name: ^transferFrom$
      args:
        0:
          tainted_from: parameter
