meta:
  id: HIGH-UNRESTRICTED-TRANSFEROWNERSHIP
  title: "Unrestricted transferOwnership"
  severity: HIGH
  confidence: MEDIUM
  description: >
    A `transferOwnership` entry point writes an owner-like state variable from a
    user-supplied address with no access control. Any caller can seize ownership
    of the contract and then reach every `onlyOwner` privileged path.
  recommendation: >
    Guard `transferOwnership` with an `onlyOwner` (or role-based) modifier, and
    prefer a two-step transfer (`Ownable2Step`) so ownership cannot be handed to
    an unrecoverable or attacker-chosen address in a single call.

query:
  scope: entrypoint
  filter:
    all:
      - func_name: '^transferOwnership$'
      - preset: unAuthenticated
  match:
    contains:
      kind: state_write
      left:
        name: '(?i)owner'
      right:
        tainted_from: parameter
